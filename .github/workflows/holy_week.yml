name: Semaine Sainte
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 29 3 *"   # 29 Mar — Dimanche des Rameaux
    - cron: "0 7 30 3 *"   # 30 Mar — Lundi Saint
    - cron: "0 7 31 3 *"   # 31 Mar — Mardi Saint
    - cron: "0 7  1 4 *"   # 01 Avr — Mercredi Saint
    - cron: "0 7  2 4 *"   # 02 Avr — Jeudi Saintname: Semaine Sainte
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 29 3 *"   # 29 Mar — Dimanche des Rameaux
    - cron: "0 5 30 3 *"   # 30 Mar — Lundi Saint
    - cron: "0 5 31 3 *"   # 31 Mar — Mardi Saint
    - cron: "0 5  1 4 *"   # 01 Avr — Mercredi Saint
    - cron: "0 5  2 4 *"   # 02 Avr — Jeudi Saint
    - cron: "0 5  3 4 *"   # 03 Avr — Vendredi Saint
    - cron: "0 5  4 4 *"   # 04 Avr — Samedi Saint
    - cron: "0 5  5 4 *"   # 05 Avr — Dimanche de Pâques
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Install dependencies
        run: |
          pip install requests pillow numpy google-api-python-client google-auth-httplib2 google-auth-oauthlib
      - name: Publier Semaine Sainte
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python holy_week.py
    - cron: "0 7  3 4 *"   # 03 Avr — Vendredi Saint
    - cron: "0 7  4 4 *"   # 04 Avr — Samedi Saint
    - cron: "0 7  5 4 *"   # 05 Avr — Dimanche de Pâques

