name: Post daily verse
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (image ou reel)'
        required: false
        default: 'image'
  schedule:
    - cron: "0 6 * * *"   # 06h00 UTC → image  (FR: 07h hiver / 08h été)
    - cron: "0 8 * * *"   # 08h00 UTC → reel   (FR: 09h hiver / 10h été)
    - cron: "0 12 * * *"  # 12h00 UTC → image  (FR: 13h hiver / 14h été)
    - cron: "0 15 * * *"  # 15h00 UTC → reel   (FR: 16h hiver / 17h été)
    - cron: "0 18 * * *"  # 18h00 UTC → image  (FR: 19h hiver / 20h été)
    - cron: "0 20 * * *"  # 20h00 UTC → reel   (FR: 21h hiver / 22h été)
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg || sudo apt-get install -y --fix-broken && sudo apt-get install -y ffmpeg || true
          ffmpeg -version
      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "08" ] || [ "$HOUR" = "15" ] || [ "$HOUR" = "20" ]; then
            echo "mode=reel" >> $GITHUB_OUTPUT
          else
            echo "mode=image" >> $GITHUB_OUTPUT
          fi
      - name: Post verse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python bot.py ${{ steps.mode.outputs.mode }}
      - name: Commit updates (progress + lists if changed)
        run: |
          git config user.name "bible-telegram-bot"
          git config user.email "bible-telegram-bot@users.noreply.github.com"
          git add progress.json promesses_curated.json jesus_curated.json psaumes_curated.json proverbes_curated.json propheties_curated.json || true
          git commit -m "Update progress" || exit 0
          git pull --rebase origin main
          git push
