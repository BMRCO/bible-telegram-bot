name: Post daily verse
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"   # Matin: 07:00 UTC (FR: 08:00 hiver / 09:00 Ã©tÃ©)
    - cron: "0 12 * * *"  # Midi: 12:00 UTC (FR: 13:00 hiver / 14:00 Ã©tÃ©)
    - cron: "0 18 * * *"  # Soir: 18:00 UTC (FR: 19:00 hiver / 20:00 Ã©tÃ©)
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Post verse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python bot.py
      - name: Commit updates (progress + lists if changed)
        run: |
          git config user.name "bible-telegram-bot"
          git config user.email "bible-telegram-bot@users.noreply.github.com"
          git add progress.json promesses_curated.json jesus_curated.json psaumes_curated.json proverbes_curated.json propheties_curated.json || true
          git commit -m "Update progress" || exit 0
          git push