name: Post daily verse
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (image ou reel)'
        required: false
        default: 'image'
  schedule:
    - cron: "0 5 * * *"   # 05h UTC → 07h France (image    — Psaume du Matin)
    - cron: "0 6 * * *"   # 06h UTC → 08h France (reel     — Promesses de Dieu)
    - cron: "0 10 * * *"  # 10h UTC → 12h France (parabole — Parabole de Jésus)
    - cron: "0 11 * * *"  # 11h UTC → 13h France (image    — Sagesse Biblique)
    - cron: "0 13 * * *"  # 13h UTC → 15h France (reel     — Paroles de Jésus)
    - cron: "0 17 * * *"  # 17h UTC → 19h France (image    — Prophéties Bibliques)
    - cron: "0 19 * * *"  # 19h UTC → 21h France (reel     — Psaume du Soir)
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "mode=parabole" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ] || [ "${{ github.event.schedule }}" = "0 13 * * *" ] || [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            echo "mode=reel" >> $GITHUB_OUTPUT
          else
            echo "mode=image" >> $GITHUB_OUTPUT
          fi
      - name: Post verse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python bot.py ${{ steps.mode.outputs.mode }}
      - name: Commit updates
        run: |
          git config user.name "bible-telegram-bot"
          git config user.email "bible-telegram-bot@users.noreply.github.com"
          git add progress.json promesses_curated.json jesus_curated.json psaumes_curated.json proverbes_curated.json propheties_curated.json paraboles_curated.json || true
          git commit -m "Update progress" || exit 0
          git fetch origin main
          git checkout origin/main -- progress.json || true
          git add progress.json || true
          git commit -m "Merge progress" || true
          git push origin HEAD:main || true
