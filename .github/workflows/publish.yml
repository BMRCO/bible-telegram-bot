name: Post daily verse
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (image ou reel)'
        required: false
        default: 'image'
  schedule:
    - cron: "0 7 * * *"   # 07h00 UTC → image  (FR: 08h hiver / 09h été)
    - cron: "0 11 * * *"  # 11h00 UTC → reel   (FR: 12h hiver / 13h été)
    - cron: "0 12 * * *"  # 12h00 UTC → image  (FR: 13h hiver / 14h été)
    - cron: "0 18 * * *"  # 18h00 UTC → reel   (FR: 19h hiver / 20h été)
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg || sudo apt-get install -y --fix-broken ffmpeg || true
          ffmpeg -version
      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "11" ] || [ "$HOUR" = "18" ]; then
            echo "mode=reel" >> $GITHUB_OUTPUT
          else
            echo "mode=image" >> $GITHUB_OUTPUT
          fi
      - name: Post verse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python bot.py ${{ steps.mode.outputs.mode }}
      - name: Commit updates (progress + lists if changed)
        run: |
          git config user.name "bible-telegram-bot"
          git config user.email "bible-telegram-bot@users.noreply.github.com"
          git add progress.json promesses_curated.json jesus_curated.json psaumes_curated.json proverbes_curated.json propheties_curated.json || true
          git commit -m "Update progress" || exit 0
          git push